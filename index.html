/* ═══════════════════════════════════
   MODERN THEME (default)
═══════════════════════════════════ */
:root,[data-theme="modern"]{
  --bg:#f4f2ed;--surface:#fff;--surface2:#eeece6;--surface3:#e5e2da;
  --border:#d6d2c8;--border2:#c8c3b8;--text:#18160f;--text2:#6a6558;--text3:#a09b90;
  --accent:#d4511a;--accent2:#b84315;--accent-bg:#fdf0ea;--accent-border:#f0c4a8;
  --green:#2a7a48;--green-bg:#e8f5ee;--green-border:#a8d8bc;
  --blue:#1a5282;--blue-bg:#e8f0f8;--blue-border:#a8c4e0;
  --gold:#a07810;--gold-bg:#fdf8e0;--gold-border:#e0cc80;
  --purple:#6b3aad;--purple-bg:#f3eeff;--purple-border:#c8aaee;
  --r:10px;--sans:'Barlow',sans-serif;--mono:'DM Mono',monospace;
  --sb-width:240px;
}
/* ═══════════════════════════════════
   90s THEME 🔥
═══════════════════════════════════ */
[data-theme="90s"]{
  --bg:#000080;--surface:#c0c0c0;--surface2:#a0a0a0;--surface3:#808080;
  --border:#ffffff;--border2:#808080;--text:#000000;--text2:#000080;--text3:#404040;

  --blue:#0000ff;--blue-bg:#0000ff22;--blue-border:#0000ff;
  --gold:#ffff00;--gold-bg:#ffff0033;--gold-border:#ffff00;
  --purple:#ff00ff;--purple-bg:#ff00ff22;--purple-border:#ff00ff;
  --r:0px;--sans:'Comic Neue','Comic Sans MS',cursive;--mono:'Courier New',monospace;
  --sb-width:240px;
}

[data-theme="90s"] .page-sub{color:#00ffff;font-family:'Courier New',monospace;}
[data-theme="90s"] .progress-wrap{background:#c0c0c0;border:3px solid;border-color:#fff #808080 #808080 #fff;}
[data-theme="90s"] .progress-fill{background:linear-gradient(90deg,#ff00ff,#00ffff,#ff00ff);background-size:200% 100%;animation:marquee90 1s linear infinite;}
[data-theme="90s"] .progress-fill.done{background:#00ff00;}

[data-theme="90s"] .modal-title{color:#000080;font-family:'Courier New',monospace;}
[data-theme="90s"] .rank-num{border-radius:0;}
[data-theme="90s"] .rank-1 .rank-num{background:#ffff00;color:#000080;}
[data-theme="90s"] .sb-add{border-radius:0;}

[data-theme="90s"] .view-banner{background:#c0c0c0;border-bottom:3px solid #808080;font-family:'Courier New',monospace;}

[data-theme="90s"] .tie-group{background:#c0c0c0;border:2px inset #808080;}

[data-theme="90s"] .bt.winner{background:#00ff00;color:#000;}

[data-theme="90s"] .drag-handle{color:#000080;}

[data-theme="90s"] .welcome-sub{color:#00ffff;font-family:'Courier New',monospace;}
[data-theme="90s"] td{font-family:'Courier New',monospace;font-size:12px;}
[data-theme="90s"] th{font-family:'Courier New',monospace;color:#000080;}
[data-theme="90s"] .hist-card{background:#c0c0c0;border:3px solid;border-color:#fff #808080 #808080 #fff;}
[data-theme="90s"] .tournament-pill{border-radius:0;}

[data-theme="90s"] .tournament-pill.active .tp-name{color:#ffff00;}

[data-theme="90s"] .sb-logo::after{content:" ★ RADICAL ★";color:#00ffff;font-size:9px;}
@keyframes marquee90{0%{background-position:0% 0}100%{background-position:200% 0}}

═══════════════════════════════════ */

[data-theme="pro"] .bc0{background:#2a0e0e;color:#f85149;border-color:#6e1c1c;}
[data-theme="pro"] .bc1{background:#132437;color:#58a6ff;border-color:#1f4068;}
[data-theme="pro"] .bc2{background:#0d2b14;color:#56d364;border-color:#196127;}
[data-theme="pro"] .welcome-title{color:#e6edf3;}
[data-theme="pro"] .welcome-sub{color:#484f58;}
[data-theme="pro"] .btn-ghost{border-color:#30363d;color:#8b949e;}
[data-theme="pro"] .btn-ghost:hover{border-color:#2f81f7;color:#2f81f7;background:#132437;}
[data-theme="pro"] .div-label{color:#484f58;}
[data-theme="pro"] .sb-section{color:#484f58;}
[data-theme="pro"] tr.row-done td{opacity:.3;}
[data-theme="pro"] tr.bye-row td{background:#271d06;}
[data-theme="pro"] .day-dot{box-shadow:0 0 6px rgba(47,129,247,.4);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);font-size:14px;}
.shell{display:flex;height:100dvh;overflow:hidden;}
.sidebar{width:var(--sb-width);min-width:var(--sb-width);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;overflow-y:auto;background:var(--bg);}
.main-inner{max-width:980px;margin:0 auto;padding:22px 18px 80px;}
/* SIDEBAR */
.sb-head{padding:12px 12px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sb-logo{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.sb-tagline{font-size:10px;color:var(--text3);margin-top:1px;}
.theme-toggle{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-size:11px;color:var(--text3);font-family:var(--sans);transition:all .12s;white-space:nowrap;}
.theme-toggle:hover{background:var(--surface2);}
[data-theme="90s"] .theme-toggle{border-radius:0;border:2px solid;border-color:#fff #808080 #808080 #fff;font-family:'Courier New',monospace;color:#000080;}
.sb-tournament-bar{padding:7px 7px 0;border-bottom:1px solid var(--border);}
.tournament-pill{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:7px;cursor:pointer;transition:background .1s;margin-bottom:4px;border:1px solid transparent;}
.tournament-pill:hover{background:var(--surface2);}
.tournament-pill.active{background:var(--accent-bg);border-color:var(--accent-border);}
.tournament-pill.active .tp-name{color:var(--accent);}
.tp-icon{font-size:13px;flex-shrink:0;}
.tp-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-count{font-family:var(--mono);font-size:9px;color:var(--text3);flex-shrink:0;}
.tp-actions{display:flex;gap:1px;flex-shrink:0;}
.tp-btn{background:transparent;border:none;cursor:pointer;font-size:11px;padding:1px 3px;border-radius:3px;line-height:1;opacity:.6;}
.tp-btn:hover{opacity:1;background:rgba(0,0,0,.07);}
.tp-btn-del:hover{background:#fff0f0;}
.add-tournament-btn{width:100%;padding:6px;border:1.5px dashed var(--border);border-radius:7px;background:transparent;cursor:pointer;font-size:12px;color:var(--text3);font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:7px;transition:all .12s;}
.add-tournament-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.sb-section{padding:8px 12px 2px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.sb-scroll{flex:1;overflow-y:auto;padding:3px 6px;}
.div-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:3px 7px;font-family:var(--mono);}
.pool-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;cursor:pointer;transition:background .1s;margin-bottom:1px;}
.pool-item:hover{background:var(--surface2);}
.pool-item.active{background:var(--accent-bg);}
.pool-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pool-name{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pool-item.active .pool-name{color:var(--accent);}
.pool-meta{font-family:var(--mono);font-size:9px;color:var(--text3);}
.sb-add{margin:3px 6px;padding:7px;border:1.5px dashed var(--border);border-radius:7px;background:transparent;cursor:pointer;font-size:11px;color:var(--text3);font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;}
.sb-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.sb-foot{padding:8px 6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.sb-foot-btn{width:100%;padding:6px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;font-size:11px;font-family:var(--sans);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .1s;}
.sb-foot-btn:hover{background:var(--surface3);color:var(--text);}
/* HEADER */
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:700;line-height:1.1;}
.page-sub{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px;}
.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:9px;padding:3px;border:1px solid var(--border);flex-wrap:wrap;}
.tab{padding:5px 10px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:var(--sans);transition:all .12s;white-space:nowrap;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
/* PROGRESS */
.progress-wrap{margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 15px;}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.progress-label{font-size:12px;font-weight:600;color:var(--text2);}
.progress-count{font-family:var(--mono);font-size:11px;color:var(--text3);}
.progress-bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;}
.progress-fill.done{background:var(--green);}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px;}
.card-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:11px;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
/* INPUTS */
input[type=text],input[type=number],select{padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);font-family:var(--sans);outline:none;transition:border .12s,box-shadow .12s;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,81,26,.12);}
/* SCORE BOXES — CLEAN AND CLEAR */
.score-box{width:48px;height:36px;padding:4px 2px;border:2px solid var(--border);font-size:18px;font-weight:700;text-align:center;background:var(--surface);color:var(--text);font-family:var(--mono);outline:none;transition:all .1s;-moz-appearance:textfield;appearance:textfield;}
.score-box::-webkit-outer-spin-button,.score-box::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.score-box:first-child{border-radius:7px 0 0 7px;border-right:none;}
.score-box:last-child{border-radius:0 7px 7px 0;border-left:none;}
.score-sep{font-size:16px;font-weight:700;color:var(--text2);padding:0 4px;background:var(--surface2);border-top:2px solid var(--border);border-bottom:2px solid var(--border);line-height:36px;flex-shrink:0;}
.score-box:focus{border-color:var(--accent);background:var(--accent-bg);}
.score-box:disabled{opacity:.25;cursor:not-allowed;background:var(--surface2);}
/* BRACKET SCORE INPUTS — EVEN BIGGER */
.bm-score-inp{width:46px;height:34px;padding:3px 2px;border:2px solid var(--border);font-size:17px;font-weight:700;text-align:center;background:var(--surface);color:var(--text);font-family:var(--mono);outline:none;border-radius:5px;-moz-appearance:textfield;appearance:textfield;}
.bm-score-inp::-webkit-outer-spin-button,.bm-score-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.bm-score-inp:focus{border-color:var(--accent);background:var(--accent-bg);}
.bm-score-inp:disabled{opacity:.25;cursor:not-allowed;}
/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:20px;cursor:pointer;transition:background .2s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);}
.toggle-label{font-size:13px;font-weight:500;}
.toggle-sub{font-size:11px;color:var(--text3);}
/* COUNT */
.count-ctl{display:flex;align-items:center;gap:10px;}
.cnt-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:17px;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1;transition:all .1s;}
.cnt-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.cnt-num{font-size:22px;font-weight:700;font-family:var(--mono);min-width:30px;text-align:center;}
.cnt-lbl{font-size:11px;color:var(--text3);}
/* TEAM GRID */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-top:5px;}
.team-inp-row{display:flex;align-items:center;gap:6px;}
.team-num-badge{width:20px;height:20px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);font-family:var(--mono);flex-shrink:0;}
/* BUTTONS */
.btn{padding:6px 13px;border:1px solid var(--border);border-radius:var(--r);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);font-family:var(--sans);transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.btn-sm{padding:3px 8px;font-size:11px;}
.btn-ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}
.btn-danger{color:#c0392b;border-color:#f5c0c0;}
.btn-danger:hover{background:#fff0f0;}
.btn-ghost{background:transparent;border:1.5px dashed var(--border);color:var(--text3);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
/* TABLES */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 8px;text-align:left;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
th.c,td.c{text-align:center;}
td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.row-done td{opacity:.48;}
tr.bye-row td{background:var(--gold-bg);}
/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;font-family:var(--mono);white-space:nowrap;}
.badge-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.badge-bye{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);}
/* STANDINGS */
.rank-cell{display:flex;align-items:center;gap:7px;}
.rank-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);background:var(--surface2);color:var(--text3);flex-shrink:0;}
.rank-1 .rank-num{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);}
.rank-2 .rank-num{background:var(--surface3);color:var(--text2);border:1px solid var(--border2);}
.rank-3 .rank-num{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.mono{font-family:var(--mono);}
.pos{color:var(--green);font-family:var(--mono);font-weight:600;}
.neg{color:var(--accent);font-family:var(--mono);font-weight:600;}
.zer{color:var(--text3);font-family:var(--mono);}
.mw{color:var(--green);font-family:var(--mono);}
.ml{color:var(--text3);font-family:var(--mono);}
/* TIE */
.tie-card{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--r);padding:13px 15px;margin-bottom:12px;}
.tie-group{background:var(--surface);border:1px solid var(--gold-border);border-radius:7px;padding:10px 12px;margin-bottom:7px;}
.tie-group:last-child{margin-bottom:0;}
.tie-teams{font-size:13px;font-weight:600;margin-bottom:4px;}
.tie-breakdown{font-size:12px;color:var(--text2);line-height:1.7;}
.tie-verdict{font-size:12px;font-weight:600;color:var(--green);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
.tie-still{font-size:11px;color:var(--accent);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
/* TEAM HISTORY */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;}
.hist-team{font-size:14px;font-weight:700;margin-bottom:9px;}
.hist-row{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.hist-row:last-child{border-bottom:none;}
.hist-result{font-family:var(--mono);font-size:11px;font-weight:700;width:22px;text-align:center;flex-shrink:0;}
.hist-result.w{color:var(--green);}
.hist-result.l{color:var(--accent);}
.hist-result.bye{color:var(--gold);}
/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:8px;}
.bracket{display:flex;align-items:flex-start;min-width:max-content;}
.bracket-round{display:flex;flex-direction:column;min-width:215px;}
.bracket-round-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 7px 8px;text-align:center;}
.bracket-slot{display:flex;flex-direction:column;justify-content:center;flex:1;padding:3px 2px;}
.bm{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;min-width:195px;}
.bm.bm-active{border-color:var(--blue-border);border-width:2px;}
.bt{display:flex;align-items:center;padding:6px 9px;font-size:12px;font-weight:500;border-bottom:1px solid var(--border);gap:4px;min-height:31px;}
.bt:last-child{border-bottom:none;}
.bt.winner{background:var(--green-bg);color:var(--green);}
.bt.loser{opacity:.4;}
.bt.tbd{color:var(--text3);font-style:italic;font-weight:400;}
.bt-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;}
.bt-seed{font-family:var(--mono);font-size:9px;color:var(--text3);flex-shrink:0;}
.bt-score{font-family:var(--mono);font-size:12px;font-weight:700;flex-shrink:0;margin-left:3px;}
.bm-score-row{display:flex;align-items:center;gap:4px;padding:5px 8px;background:var(--surface2);border-top:1.5px solid var(--border);flex-wrap:nowrap;}
.bm-sep{font-size:14px;font-weight:700;color:var(--text2);flex-shrink:0;}
.bracket-connector{width:12px;border-top:1.5px solid var(--border2);align-self:center;flex-shrink:0;}
/* COURTS */
.courts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.court-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;}
.court-num{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
/* FILTER */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px;align-items:center;}
.pill{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--sans);font-weight:500;transition:all .1s;}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:var(--surface);border-radius:13px;padding:22px;width:460px;max-width:92vw;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:5px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:15px;line-height:1.5;}
.modal-row{margin-bottom:10px;}
.modal-row label{display:block;font-size:12px;color:var(--text3);margin-bottom:3px;}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;}
/* DAY ROWS */
.day-row-item{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap;}
.day-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
/* DRAG */
.drag-handle{cursor:grab;color:var(--text3);padding:0 3px;font-size:14px;user-select:none;touch-action:none;}
.drag-handle:active{cursor:grabbing;}
tr.drag-over td{border-top:2px solid var(--accent);}
/* SETS SELECTOR */
.sets-selector{display:flex;gap:5px;}
.sets-opt{padding:4px 11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);background:transparent;font-family:var(--sans);transition:all .1s;}
.sets-opt.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* VIEW BANNER */
.view-banner{background:var(--blue-bg);border-bottom:1px solid var(--blue-border);padding:8px 16px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
/* EDIT MATCH INLINE */
.edit-match-row{background:var(--accent-bg);border:1px solid var(--accent-border);}
.edit-match-row td{padding:8px;}
.session-sel{padding:3px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;background:var(--surface);color:var(--text);font-family:var(--sans);outline:none;cursor:pointer;}
.session-sel:focus{border-color:var(--accent);}
/* WIZARD */
.wizard-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;}
.wizard-highlight{position:absolute;border-radius:10px;box-shadow:0 0 0 4px var(--accent),0 0 0 9999px rgba(0,0,0,.45);transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:301;}
.wizard-tooltip{position:absolute;background:var(--surface);border-radius:11px;padding:15px 17px;width:280px;box-shadow:0 8px 40px rgba(0,0,0,.22);pointer-events:all;z-index:302;}
.wz-step-pill{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.wz-title{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.wz-body{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:11px;}
.wz-actions{display:flex;gap:7px;justify-content:flex-end;}
.wz-skip{font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;font-family:var(--sans);padding:3px;}
.wz-progress{display:flex;gap:3px;margin-bottom:9px;}
.wz-dot{width:5px;height:5px;border-radius:50%;background:var(--surface3);}
.wz-dot.done{background:var(--accent);}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;}
.welcome-icon{font-size:38px;margin-bottom:11px;}
.welcome-title{font-size:21px;font-weight:700;margin-bottom:7px;}
.welcome-sub{font-size:13px;color:var(--text3);max-width:260px;line-height:1.6;margin-bottom:18px;}
/* TOURNAMENT HISTORY */
.hist-tournament{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;}
.hist-t-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.hist-t-name{font-size:15px;font-weight:700;}

.pool-history-row:last-child{border-bottom:none;}
.pool-history-name{font-weight:600;flex:1;}
.pool-history-meta{font-family:var(--mono);font-size:10px;color:var(--text3);}
/* COLLAPSIBLE SIDEBAR */
.sidebar{transition:width .22s cubic-bezier(.4,0,.2,1),min-width .22s;}
.sidebar.collapsed{width:48px !important;min-width:48px !important;}
.sidebar.collapsed .sb-tagline,.sidebar.collapsed .pool-name,.sidebar.collapsed .pool-meta,
.sidebar.collapsed .div-label,.sidebar.collapsed .sb-add span:not(.plus-icon),
.sidebar.collapsed .sb-foot-btn span,.sidebar.collapsed .tp-name,.sidebar.collapsed .tp-count,
.sidebar.collapsed .sb-tournament-bar>.add-tournament-btn span,.sidebar.collapsed .sb-section,
.sidebar.collapsed .theme-toggle span,.sidebar.collapsed .sb-logo-text{display:none;}

.sidebar.collapsed .pool-dot{width:11px;height:11px;}
.sidebar.collapsed .sb-add{padding:9px;justify-content:center;}
.sidebar.collapsed .tournament-pill{justify-content:center;padding:7px 0;}
.sidebar.collapsed .tp-actions{display:none;}
.sidebar.collapsed .sb-foot-btn{justify-content:center;padding:8px 0;}
.sidebar-collapse-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0;}
.sidebar-collapse-btn:hover{color:var(--text);background:var(--surface2);}
/* When collapsed: keep sb-head visible, center the expand button */
.sidebar.collapsed .sb-head{justify-content:center;padding:12px 4px;}
.sidebar.collapsed .sb-head > div:first-child{display:none;}
.sidebar.collapsed .sb-head > div:last-child{justify-content:center;}
.sidebar.collapsed .theme-toggle{display:none;}
.sidebar.collapsed .sidebar-collapse-btn{font-size:16px;padding:4px 6px;}
/* AWARDS */
.award-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;}
.award-card-header{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.award-t-name{font-size:14px;font-weight:700;}

.award-table th{padding:7px 12px;text-align:left;font-size:10px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}

.award-table tr:last-child td{border-bottom:none;}

.award-pos-2{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.award-pos-3{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.award-pos-mvp{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}
.award-pos-other{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}

<body>
<script>const IS_VIEW=location.search.includes('view')||location.hash.includes('view=1');</script>
<div class="shell">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div><div class="sb-logo"><span class="sb-logo-text">TourneyTrack</span></div><div class="sb-tagline">it just makes sense</div></div>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="theme-toggle" id="theme-btn" onclick="cycleTheme()" title="Change theme">🕹 <span>90s</span></button>
        <button class="sidebar-collapse-btn" id="sb-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">◀</button>
      </div>
    </div>
    <div class="sb-tournament-bar" id="sb-tournaments"></div>
    <div class="sb-section">Pools</div>
    <div class="sb-scroll" id="sb-scroll"></div>
    <button class="sb-add" id="add-pool-btn" onclick="openNewPoolModal()"><span class="plus-icon" style="font-size:15px">+</span><span>Add pool</span></button>
    <div class="sb-foot" id="sb-foot">
      <button class="sb-foot-btn" onclick="showAbout()">📖 About TourneyTrack</button>
      <button class="sb-foot-btn" onclick="showShareModal()">🔗 Share / QR code</button>
      <button class="sb-foot-btn" onclick="openSyncSetupModal()">☁️ Live sync setup</button>
      <button class="sb-foot-btn" onclick="printStandings()">🖨 Print standings</button>
      <button class="sb-foot-btn" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="sb-foot-btn" style="color:#c0392b;" onclick="confirmResetAll()">⚠ Reset everything</button>
    </div>
  </div>
  <div class="main">
    <div id="view-banner" style="display:none" class="view-banner">👁 View-only — live results. <a href="?" style="color:var(--blue);margin-left:6px">Open editor →</a></div>
    <div class="main-inner" id="main-content"></div>
  </div>
</div>
<div class="modal-bg" id="modal" style="display:none" onclick="closeModal(event)"><div class="modal" id="modal-inner"></div></div>
<div class="wizard-overlay" id="wizard-overlay" style="display:none"><div class="wizard-highlight" id="wz-highlight"></div><div class="wizard-tooltip" id="wz-tooltip"></div></div>
<script>
const COLORS=['#d4511a','#1a5282','#2a7a48','#6b3aad','#a07810','#c0392b','#0891b2'];
let state=loadState();
let activeTournament=(state.tournaments||[]).length?state.tournaments[0].id:null;
let activePool=null,activeTab=IS_VIEW?'standings':'setup',activeFilter='all';
let editingMatchIdx=null;

// ── THEME ──
function loadTheme(){const t=localStorage.getItem('tt_theme')||'modern';document.documentElement.setAttribute('data-theme',t);updateThemeBtn(t);}
function updateThemeBtn(t){const btn=document.getElementById('theme-btn');if(!btn)return;if(t==='modern')btn.innerHTML='🕹 <span>90s</span>';else if(t==='90s')btn.innerHTML='✨ <span>Trendy</span>';else if(t==='trendy')btn.innerHTML='💼 <span>Pro</span>';else if(t==='pro')btn.innerHTML='🔥 <span>JAM</span>';else if(t==='nbajam')btn.innerHTML='🍎 <span>Apple</span>';else btn.innerHTML='🌿 <span>Modern</span>';}
function cycleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'modern';const next=cur==='modern'?'90s':cur==='90s'?'trendy':cur==='trendy'?'pro':cur==='pro'?'nbajam':cur==='nbajam'?'apple':'modern';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('tt_theme',next);updateThemeBtn(next);}
loadTheme();
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('sb-collapse-btn');
  const collapsed=sb.classList.toggle('collapsed');
  localStorage.setItem('tt_sb_collapsed',collapsed?'1':'0');
  if(btn){btn.textContent=collapsed?'▶':'◀';btn.title=collapsed?'Expand sidebar':'Collapse sidebar';}
}
function loadSidebarState(){
  if(localStorage.getItem('tt_sb_collapsed')==='1'){
    const sb=document.getElementById('sidebar');if(sb)sb.classList.add('collapsed');
    const btn=document.getElementById('sb-collapse-btn');if(btn)btn.textContent='▶';
  }
}
loadSidebarState();

// ── STATE ──
function loadState(){
  try{const hash=location.hash;if(hash.startsWith('#data=')){const raw=decodeURIComponent(hash.slice(6).replace(/&view=1$/,''));const d=JSON.parse(atob(raw));if(d&&d.tournaments)return d;}}catch(e){}
  try{const s=localStorage.getItem('tt_v8');if(s)return JSON.parse(s);}catch(e){}
  return{tournaments:[],divisions:[],history:[]};
}
function save(){
  if(IS_VIEW)return;
  try{localStorage.setItem('tt_v8',JSON.stringify(state));}catch(e){}
}
function tournament(){return(state.tournaments||[]).find(t=>t.id===activeTournament);}
function pool(){const t=tournament();return t?(t.pools||[]).find(p=>p.id===activePool):null;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return '_'+Math.random().toString(36).slice(2,9);}
function dayName(d){return typeof d==='object'?d.name:(d||'');}
function dayLoc(d){return typeof d==='object'?d.location||'':'';}

if(IS_VIEW){document.getElementById('view-banner').style.display='flex';document.getElementById('add-pool-btn').style.display='none';document.getElementById('sb-foot').style.display='none';}

// ── SIDEBAR ──
function renderSidebar(){
  const tb=document.getElementById('sb-tournaments');tb.innerHTML='';
  (state.tournaments||[]).forEach(t=>{
    const isActive=t.id===activeTournament;
    const d=document.createElement('div');d.className='tournament-pill'+(isActive?' active':'');
    d.innerHTML=`<span class="tp-icon">🏆</span><span class="tp-name">${esc(t.name)}</span><span class="tp-count">${(t.pools||[]).length}P</span>${isActive&&!IS_VIEW?`<span class="tp-actions"><button class="tp-btn" onclick="event.stopPropagation();openRenameTModal('${t.id}')">✏️</button><button class="tp-btn tp-btn-del" onclick="event.stopPropagation();confirmDeleteT('${t.id}')">🗑</button></span>`:''}`;
    d.onclick=()=>{activeTournament=t.id;activePool=(t.pools&&t.pools.length)?t.pools[0].id:null;render();};
    tb.appendChild(d);
  });
  if(!IS_VIEW){const addT=document.createElement('button');addT.className='add-tournament-btn';addT.id='add-tournament-btn';addT.innerHTML='<span style="font-size:13px">+</span><span>New tournament</span>';addT.onclick=openNewTModal;tb.appendChild(addT);}
  const sb=document.getElementById('sb-scroll');sb.innerHTML='';
  const t=tournament();
  if(!t||!(t.pools||[]).length){sb.innerHTML='<div style="padding:9px;font-size:11px;color:var(--text3)">No pools yet</div>';return;}
  const divPools={},noDivPools=[];
  t.pools.forEach(p=>{if(p.divId&&state.divisions.find(d=>d.id===p.divId)){if(!divPools[p.divId])divPools[p.divId]=[];divPools[p.divId].push(p);}else noDivPools.push(p);});
  const mkPool=p=>{const idx=(t.pools||[]).findIndex(x=>x.id===p.id)%COLORS.length;const d=document.createElement('div');d.className='pool-item'+(p.id===activePool?' active':'');d.innerHTML=`<div class="pool-dot" style="background:${COLORS[idx]}"></div><div class="pool-name">${esc(p.name)}</div><div class="pool-meta">${p.numTeams}T</div>`;d.onclick=()=>{activePool=p.id;render();};sb.appendChild(d);};
  state.divisions.forEach(div=>{const pools=divPools[div.id];if(!pools||!pools.length)return;const g=document.createElement('div');g.innerHTML=`<div class="div-label">${esc(div.name)}</div>`;sb.appendChild(g);pools.forEach(mkPool);});
  if(noDivPools.length){if(state.divisions.length&&Object.keys(divPools).length){const l=document.createElement('div');l.className='div-label';l.textContent='Other';sb.appendChild(l);}noDivPools.forEach(mkPool);}
}

// ── RENDER ──
function render(){
  renderSidebar();
  const t=tournament(),p=pool();
  if(!t){document.getElementById('main-content').innerHTML=`<div class="welcome"><div class="welcome-icon">🏐</div><div class="welcome-title">Welcome to TourneyTrack</div><div class="welcome-sub">Create your first tournament to get started managing pools, scores, and brackets.</div>${IS_VIEW?'':`<button class="btn btn-primary" id="wc-start-btn" onclick="openNewTModal()">+ Create tournament</button>`}</div>`;return;}
  if(!p){document.getElementById('main-content').innerHTML=`<div class="welcome"><div class="welcome-icon">🏐</div><div class="welcome-title">${esc(t.name)}</div><div class="welcome-sub">Add your first pool to this tournament.</div>${IS_VIEW?'':`<button class="btn btn-primary" onclick="openNewPoolModal()">+ Add pool</button>`}</div>`;return;}
  let html=pageHeader(p);
  if(activeTab==='setup')html+=renderSetup(p);
  else if(activeTab==='scores')html+=renderScores(p);
  else if(activeTab==='standings')html+=renderStandings(p);
  else if(activeTab==='bracket')html+=renderBracket(p);
  else if(activeTab==='courts')html+=renderCourts(p);
  else if(activeTab==='history')html+=renderTeamHistory(p);
  else if(activeTab==='tourney-history')html+=renderTournamentHistory();
  else if(activeTab==='awards')html+=renderAwards();
  document.getElementById('main-content').innerHTML=html;
  initDrag();
}
function pageHeader(p){
  const prog=matchProgress(p);
  const allTabs=IS_VIEW?['standings','bracket','courts','history']:['setup','scores','standings','bracket','courts','history','tourney-history','awards'];
  const tabLabels={setup:'Setup',scores:'Schedule',standings:'Standings',bracket:'Bracket',courts:'Courts',history:'Team History','tourney-history':'Tourney History',awards:'🏆 Awards'};
  const tabBar=allTabs.map(t=>`<button class="tab ${activeTab===t?'active':''}" onclick="setTab('${t}')">${tabLabels[t]}</button>`).join('');
  return `<div class="page-hd">
    <div><div class="page-title">${esc(p.name)}</div><div class="page-sub">${p.sport==='basketball'?'🏀':'🏐'} ${p.numTeams} teams · ${p.schedule.length} matches · ${prog.done}/${prog.total} complete${p.director?` · Dir: ${esc(p.director)}`:''}</div></div>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
      <div class="tab-bar" id="pool-tab-bar">${tabBar}</div>
      ${!IS_VIEW?`<button class="btn btn-sm btn-danger" onclick="confirmDeletePool()">Delete</button>`:''}
    </div>
  </div>${prog.total>0?progressBar(prog):''}`;
}
function matchProgress(p){let done=0;const total=p.schedule.filter((_,i)=>!isBye(p,i)).length;p.schedule.forEach((_,i)=>{if(!isBye(p,i)&&isMatchDone(p,i))done++;});return{done,total};}
function progressBar(prog){const pct=prog.total?Math.round(prog.done/prog.total*100):0,isDone=pct===100;return`<div class="progress-wrap"><div class="progress-top"><span class="progress-label">${isDone?'✓ All matches complete':'Pool play progress'}</span><span class="progress-count">${prog.done} of ${prog.total}</span></div><div class="progress-bar"><div class="progress-fill${isDone?' done':''}" style="width:${pct}%"></div></div></div>`;}
function isBye(p,i){const m=p.schedule[i];return m&&(m.a===0||m.b===0||m.bye);}

// ── MATCH UTILS (sport-aware) ──
function isBball(p){return p&&p.sport==='basketball';}

// Basketball: scores stored as bk_a / bk_b (final totals) or q1a/q1b..q4a/q4b or h1a/h1b/h2a/h2b
function getBballTotal(sc,side){
  const periods=sc._periods||'final';
  const ot=parseInt(sc['ot'+side])||0; // overtime always added if present
  if(periods==='halves'){const h1=parseInt(sc['h1'+side])||0;const h2=parseInt(sc['h2'+side])||0;return h1+h2+ot;}
  if(periods==='quarters'){const q1=parseInt(sc['q1'+side])||0;const q2=parseInt(sc['q2'+side])||0;const q3=parseInt(sc['q3'+side])||0;const q4=parseInt(sc['q4'+side])||0;return q1+q2+q3+q4+ot;}
  return parseInt(sc['bk_'+side])||0; // final mode already includes OT conceptually
}
function getBballWinner(sc){
  const ta=getBballTotal(sc,'a');const tb=getBballTotal(sc,'b');
  const hasScore=ta>0||tb>0;if(!hasScore)return null;
  if(ta>tb)return'a';if(tb>ta)return'b';return null; // ties possible in basketball
}

function getSetResults(sc){return[['s1a','s1b'],['s2a','s2b'],['s3a','s3b']].map(([ak,bk])=>{const na=parseInt(sc[ak]),nb=parseInt(sc[bk]);if(isNaN(na)||isNaN(nb)||sc[ak]===''||sc[ak]===undefined||sc[bk]===''||sc[bk]===undefined)return null;return{a:na,b:nb};});}
function getMatchWinner(sc,p){
  if(isBball(p))return getBballWinner(sc);
  const maxSets=(p&&p.maxSets)||3;const oneSet=p&&p.oneSetTiebreaker;
  let wa=0,wb=0;getSetResults(sc).forEach(r=>{if(!r)return;if(r.a>r.b)wa++;else if(r.b>r.a)wb++;});
  const needed=oneSet?1:Math.ceil(maxSets/2);if(wa>=needed)return'a';if(wb>=needed)return'b';return null;
}
function isMatchDone(p,i){
  const sc=p.scores[i]||{};
  if(isBball(p)){const ta=getBballTotal(sc,'a'),tb=getBballTotal(sc,'b');return ta>0||tb>0;}
  return getMatchWinner(sc,p)!==null;
}
function setSport(sport){
  const p=pool();if(!p||IS_VIEW)return;
  p.sport=sport;
  // Reset sport-specific settings
  if(sport==='basketball'){p.bkPeriods=p.bkPeriods||'final';}
  save();render();
}

// ── STATS ──
function getStats(p){
  const stats={};for(let i=1;i<=p.numTeams;i++)stats[i]={mw:0,ml:0,sw:0,sl:0,pf:0,pa:0,byes:0};
  const bball=isBball(p);
  p.schedule.forEach((m,idx)=>{
    if(isBye(p,idx)){const at=m.a&&m.a!==0?m.a:m.b;if(at&&stats[at])stats[at].byes++;return;}
    const sc=p.scores[idx]||{};
    if(bball){
      const ta=getBballTotal(sc,'a'),tb2=getBballTotal(sc,'b');
      if(ta>0||tb2>0){
        stats[m.a].pf+=ta;stats[m.a].pa+=tb2;stats[m.b].pf+=tb2;stats[m.b].pa+=ta;
        const w=getMatchWinner(sc,p);
        if(w==='a'){stats[m.a].mw++;stats[m.a].sw++;stats[m.b].ml++;stats[m.b].sl++;}
        else if(w==='b'){stats[m.b].mw++;stats[m.b].sw++;stats[m.a].ml++;stats[m.a].sl++;}
      }
    }else{
      getSetResults(sc).forEach(r=>{if(!r)return;stats[m.a].pf+=r.a;stats[m.a].pa+=r.b;stats[m.b].pf+=r.b;stats[m.b].pa+=r.a;if(r.a>r.b){stats[m.a].sw++;stats[m.b].sl++;}else if(r.b>r.a){stats[m.b].sw++;stats[m.a].sl++;}});
      const w=getMatchWinner(sc,p);if(w==='a'){stats[m.a].mw++;stats[m.b].ml++;}else if(w==='b'){stats[m.b].mw++;stats[m.a].ml++;}
    }
  });
  return stats;
}
function headToHead(p,a,b){const m=p.schedule.find(m=>(m.a===a&&m.b===b)||(m.a===b&&m.b===a));if(!m)return 0;const idx=p.schedule.indexOf(m),sc=p.scores[idx]||{};let wa=0,wb=0;getSetResults(sc).forEach(r=>{if(!r)return;if(m.a===a){if(r.a>r.b)wa++;else if(r.b>r.a)wb++;}else{if(r.b>r.a)wa++;else if(r.a>r.b)wb++;}});return wa>wb?-1:wb>wa?1:0;}
function rankTeams(p){const stats=getStats(p);const tb=p.tiebreakers||['sets','headtohead','pointdiff'];return Object.entries(stats).map(([id,s])=>({id:Number(id),...s,pm:s.pf-s.pa})).sort((a,b)=>{for(const t of tb){if(t==='sets'&&b.sw!==a.sw)return b.sw-a.sw;if(t==='matches'&&b.mw!==a.mw)return b.mw-a.mw;if(t==='pointdiff'&&b.pm!==a.pm)return b.pm-a.pm;if(t==='headtohead'){const h=headToHead(p,a.id,b.id);if(h!==0)return h;}}return 0;});}

// ── TIE SECTION ──
function detectTies(p,ranked){const tb=p.tiebreakers||['sets','headtohead','pointdiff'];const ties=[];let i=0;while(i<ranked.length){let j=i+1;while(j<ranked.length){const a=ranked[i],b=ranked[j];let tied=true;for(const t of tb){if(t==='sets'&&a.sw!==b.sw){tied=false;break;}if(t==='matches'&&a.mw!==b.mw){tied=false;break;}if(t==='pointdiff'&&a.pm!==b.pm){tied=false;break;}if(t==='headtohead'){const h=headToHead(p,a.id,b.id);if(h!==0){tied=false;break;}}}if(tied)j++;else break;}if(j-i>1)ties.push(ranked.slice(i,j));i=j;}return ties;}
function renderTieSection(p,ranked){
  const ties=detectTies(p,ranked);if(!ties.length)return'';
  const tb=p.tiebreakers||['sets','headtohead','pointdiff'];const tbL={sets:'Sets won',matches:'Match wins',headtohead:'Head-to-head',pointdiff:'Point diff'};
  let html='<div class="tie-card"><div style="display:flex;align-items:center;gap:7px;margin-bottom:9px"><span style="font-size:14px">⚠️</span><span style="font-size:13px;font-weight:600;color:var(--gold)">Tie detected — tiebreaker breakdown</span></div>';
  ties.forEach(group=>{
    html+=`<div class="tie-group"><div class="tie-teams">${group.map(t=>esc(p.teams[t.id]||'Team '+t.id)).join(' · ')}</div><div class="tie-breakdown">`;
    const tbResults=[];
    tb.forEach(t=>{
      if(t==='sets'){const vals=group.map(x=>`${esc(p.teams[x.id]||'T'+x.id)}: ${x.sw}W`).join(', ');const broke=[...new Set(group.map(x=>x.sw))].length>1;html+=`<b>Sets won:</b> ${vals}<br>`;tbResults.push({broke,label:'sets won',winner:broke?group.slice().sort((a,b)=>b.sw-a.sw)[0]:null});}
      if(t==='matches'){const vals=group.map(x=>`${esc(p.teams[x.id]||'T'+x.id)}: ${x.mw}W`).join(', ');const broke=[...new Set(group.map(x=>x.mw))].length>1;html+=`<b>Match wins:</b> ${vals}<br>`;tbResults.push({broke,label:'match wins',winner:broke?group.slice().sort((a,b)=>b.mw-a.mw)[0]:null});}
      if(t==='headtohead'&&group.length===2){const a=group[0],b=group[1],h=headToHead(p,a.id,b.id);html+=`<b>Head-to-head:</b> `;if(h<0){html+=`${esc(p.teams[a.id])} beat ${esc(p.teams[b.id])}<br>`;tbResults.push({broke:true,label:'head-to-head',winner:a});}else if(h>0){html+=`${esc(p.teams[b.id])} beat ${esc(p.teams[a.id])}<br>`;tbResults.push({broke:true,label:'head-to-head',winner:b});}else{html+=`Split / not yet played<br>`;tbResults.push({broke:false,label:'head-to-head',winner:null});}}
      if(t==='pointdiff'){const vals=group.map(x=>`${esc(p.teams[x.id]||'T'+x.id)}: ${x.pm>=0?'+':''}${x.pm}`).join(', ');const broke=[...new Set(group.map(x=>x.pm))].length>1;html+=`<b>Point diff:</b> ${vals}<br>`;tbResults.push({broke,label:'point differential',winner:broke?group.slice().sort((a,b)=>b.pm-a.pm)[0]:null});}
    });
    html+='</div>';
    const firstBreaker=tbResults.find(r=>r.broke);
    if(firstBreaker&&firstBreaker.winner)html+=`<div class="tie-verdict">✓ Tiebreaker: <b>${esc(p.teams[firstBreaker.winner.id]||'Team '+firstBreaker.winner.id)}</b> wins on ${firstBreaker.label}</div>`;
    else html+=`<div class="tie-still">⚠ Truly tied — coin flip or play-in needed</div>`;
    html+='</div>';
  });
  return html+'</div>';
}

// ── SCHEDULE GENERATION ──
function generateSchedule(){
  const p=pool();if(!p||IS_VIEW)return;
  p.scores={};p.bracketScores={};
  const mpt=p.matchesPerTeam||0;
  if(mpt>0&&mpt<p.numTeams-1){p.schedule=buildCustomSchedule(p.numTeams,mpt,p.numCourts,p.courtStart,p.days.length,p.includeByes);}
  else{
    let pairs=roundRobin(p.numTeams);
    if(p.doubleRR){
      // Double: play each opponent twice — second pass reverses home/away
      const rr2=roundRobin(p.numTeams).map(([a,b])=>[b,a]);
      pairs=[...pairs,...rr2];
    }
    const perDay=Math.ceil(pairs.length/p.days.length);
    p.schedule=pairs.map((pair,i)=>({a:pair[0],b:pair[1],court:p.courtStart+(i%p.numCourts),dayIdx:Math.min(Math.floor(i/perDay),p.days.length-1)}));
  }
  save();activeTab='scores';render();
}
function buildCustomSchedule(n,mpt,numCourts,courtStart,numDays,incByes){
  const allPairs=[];for(let i=1;i<=n;i++)for(let j=i+1;j<=n;j++)allPairs.push([i,j]);
  for(let i=allPairs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[allPairs[i],allPairs[j]]=[allPairs[j],allPairs[i]];}
  const counts={};for(let i=1;i<=n;i++)counts[i]=0;
  const selected=[];
  for(const [a,b] of allPairs){if(counts[a]<mpt&&counts[b]<mpt){selected.push([a,b]);counts[a]++;counts[b]++;}if(Object.values(counts).every(c=>c>=mpt))break;}
  const byeRows=[];
  if(incByes){for(let i=1;i<=n;i++){const need=mpt-counts[i];for(let k=0;k<need;k++)byeRows.push({bye:true,a:i,b:0});}}
  const totalRounds=Math.ceil(selected.length/numCourts);const perDay=Math.ceil(totalRounds/numDays);
  const schedule=selected.map((pair,i)=>({a:pair[0],b:pair[1],court:courtStart+(i%numCourts),dayIdx:Math.min(Math.floor(Math.floor(i/numCourts)/perDay),numDays-1)}));
  if(incByes)byeRows.forEach((b,i)=>{schedule.push({...b,court:null,dayIdx:Math.min(Math.floor(i/numDays),numDays-1)});});
  return schedule;
}
function roundRobin(n){const list=Array.from({length:n},(_,i)=>i+1);if(n%2!==0)list.push(0);const half=list.length/2,rounds=list.length-1,matches=[];for(let r=0;r<rounds;r++){for(let i=0;i<half;i++){const a=list[i],b=list[list.length-1-i];if(a!==0&&b!==0)matches.push([a,b]);}list.splice(1,0,list.pop());}return matches;}

function setBballScore(idx,field,val){

// ── TEAM HISTORY ──
function renderTeamHistory(p){
  if(!p.schedule.length)return`<div style="text-align:center;padding:48px;color:var(--text3)">No schedule yet.</div>`;
  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;">';
  for(let teamId=1;teamId<=p.numTeams;teamId++){
    const tName=p.teams[teamId]||'Team '+teamId;
    const matches=p.schedule.map((m,i)=>({m,i})).filter(({m})=>(m.a===teamId||m.b===teamId));
    let record='';const s=getStats(p)[teamId];if(s)record=`<span style="font-family:var(--mono);font-size:10px;color:var(--text3);font-weight:400"> ${s.mw}W-${s.ml}L</span>`;
    html+=`<div class="hist-card"><div class="hist-team">${esc(tName)}${record}</div>`;
    if(!matches.length){html+='<div style="font-size:11px;color:var(--text3)">No matches scheduled</div>';}
    else matches.forEach(({m,i})=>{
      if(isBye(p,i)){html+=`<div class="hist-row"><span class="hist-result bye">BYE</span><span style="flex:1;color:var(--text3);font-size:11px">Bye — ${esc(dayName(p.days[m.dayIdx]))}</span></div>`;return;}
      const sc=p.scores[i]||{};const winner=getMatchWinner(sc,p);const side=m.a===teamId?'a':'b';const opp=m.a===teamId?m.b:m.a;
      const isWin=winner===side;const isLoss=winner&&winner!==side;
      let scoreDisplay='';
      if(isBball(p)){
        const ta=getBballTotal(sc,'a'),tb2=getBballTotal(sc,'b');
        if(ta||tb2)scoreDisplay=`<span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${isWin?'var(--green)':isLoss?'var(--accent)':'var(--text2)'}">${side==='a'?ta:tb2}–${side==='a'?tb2:ta}</span>`;
        else scoreDisplay='<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">–</span>';
      }else{
        const setScores=getSetResults(sc).filter(r=>r).map(r=>side==='a'?`${r.a}–${r.b}`:`${r.b}–${r.a}`).join(', ');
        scoreDisplay=setScores?`<span style="font-family:var(--mono);font-size:10px;color:var(--text2)">${setScores}</span>`:'<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">–</span>';
      }
      const dObj=p.days[m.dayIdx];
      html+=`<div class="hist-row"><span class="hist-result ${isWin?'w':isLoss?'l':''}">${isWin?'W':isLoss?'L':'—'}</span><span style="flex:1"><b>vs ${esc(p.teams[opp]||'Team '+opp)}</b><div style="font-size:10px;color:var(--text3)">${esc(dayName(dObj))}${dayLoc(dObj)?' · '+esc(dayLoc(dObj)):''} · Crt ${m.court||'—'}</div></span>${scoreDisplay}</div>`;
    });
    html+='</div>';
  }
  return html+'</div>';
}

// ── BRACKET ──
function renderBracket(p){
  const ranked=rankTeams(p);const n=ranked.length;
  if(n<2)return`<div style="text-align:center;padding:48px;color:var(--text3)">Need at least 2 teams.</div>`;
  if(!p.bracketScores)p.bracketScores={};
  let size=1;while(size<n)size*=2;
  const seeds=[];for(let i=0;i<size;i++)seeds.push(i<n?ranked[i]:null);
  const r1=[];for(let i=0;i<size/2;i++)r1.push({a:seeds[i],b:seeds[size-1-i],id:`r0m${i}`});
  const allRounds=[r1];let prev=r1;
  while(prev.length>1){const next=[];for(let i=0;i<prev.length;i+=2)next.push({a:null,b:null,id:`r${allRounds.length}m${Math.floor(i/2)}`,fromA:prev[i].id,fromB:prev[i+1].id});allRounds.push(next);prev=next;}
  allRounds.forEach((round,ri)=>{if(ri===0)return;round.forEach(match=>{const getW=(srcId)=>{const src=allRounds[ri-1].find(m=>m.id===srcId);if(!src)return null;const bs=p.bracketScores[srcId]||{};const w=getBracketWinner(bs,p);if(w==='a')return src.a;if(w==='b')return src.b;if(src.a&&!src.b)return src.a;return null;};match.a=getW(match.fromA);match.b=getW(match.fromB);});});
  const rNames=[];if(allRounds.length>=4)rNames.push('Round of '+size);if(allRounds.length>=3)rNames.push('Quarterfinals');if(allRounds.length>=2)rNames.push('Semifinals');rNames.push('Final');const finalNames=rNames.slice(-allRounds.length);
  const prog=matchProgress(p);const pct=prog.total?Math.round(prog.done/prog.total*100):0;
  const note=pct<100?`<div style="font-size:12px;color:var(--gold);margin-bottom:11px;padding:8px 12px;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:7px">Pool play ${pct}% complete — seeding updates as scores come in.</div>`:`<div style="font-size:12px;color:var(--green);margin-bottom:11px;padding:8px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:7px">✓ Pool play complete — bracket seeding locked.</div>`;
  const maxSets=p.maxSets||3;
  let bHtml='<div class="bracket">';
  allRounds.forEach((round,ri)=>{
    const spacer=Math.pow(2,ri);
    bHtml+=`<div class="bracket-round"><div class="bracket-round-title">${finalNames[ri]||'Rd '+(ri+1)}</div><div style="display:flex;flex-direction:column;flex:1;">`;
    round.forEach(match=>{
      const{a,b,id}=match;const isBye2=a&&!b;
      const bs=p.bracketScores[id]||{};const bW=isBye2?'a':getBracketWinner(bs,p);
      const aName=a?(p.teams[a.id]||'Team '+a.id):'TBD';const bName=b?(p.teams[b.id]||'Team '+b.id):'TBD';
      const aSeed=a&&p.seeds&&p.seeds[a.id]?`<span class="bt-seed">#${p.seeds[a.id]}</span>`:'';const bSeed=b&&p.seeds&&p.seeds[b.id]?`<span class="bt-seed">#${p.seeds[b.id]}</span>`:'';
      const aClass=isBye2?'winner':bW==='a'?'winner':bW==='b'?'loser':(!a?'tbd':'');
      const bClass=isBye2?'tbd':bW==='b'?'winner':bW==='a'?'loser':(!b?'tbd':'');
      // Score inputs — basketball uses single final score, volleyball uses sets
      let scoreInputs='';
      if(a&&b&&!isBye2&&!IS_VIEW){
        if(isBball(p)){
          // Basketball bracket: Regulation + optional OT
          const sa=bs.bk_a||'',sb2=bs.bk_b||'',ota=bs.bk_ota||'',otb=bs.bk_otb||'';
          const regTa=parseInt(sa)||0,regTb=parseInt(sb2)||0;
          const otTa=parseInt(ota)||0,otTb=parseInt(otb)||0;
          const totalA=regTa+otTa,totalB=regTb+otTb;
          const tied=regTa>0&&regTa===regTb;
          scoreInputs=`<div style="padding:5px 8px;">
            <div style="display:flex;align-items:center;gap:4px;margin-bottom:${tied||otTa||otTb?'4px':'0'}">
              <span style="font-family:var(--mono);font-size:9px;color:var(--text3);width:20px">REG</span>
              <input class="bm-score-inp" type="number" min="0" max="999" value="${sa}" placeholder="–" data-mid="${id}" data-field="bk_a" oninput="setBracketScore('${id}','bk_a',this.value)" style="width:50px;font-size:17px">
              <span class="bm-sep" style="font-size:17px">:</span>
              <input class="bm-score-inp" type="number" min="0" max="999" value="${sb2}" placeholder="–" data-mid="${id}" data-field="bk_b" oninput="setBracketScore('${id}','bk_b',this.value)" style="width:50px;font-size:17px">
            </div>
            ${tied||otTa||otTb?`<div style="display:flex;align-items:center;gap:4px">
              <span style="font-family:var(--mono);font-size:9px;color:var(--accent);width:20px">OT</span>
              <input class="bm-score-inp" type="number" min="0" max="999" value="${ota}" placeholder="–" data-mid="${id}" data-field="bk_ota" oninput="setBracketScore('${id}','bk_ota',this.value)" style="width:50px;font-size:17px;border-color:var(--accent)">
              <span class="bm-sep" style="font-size:17px;color:var(--accent)">:</span>
              <input class="bm-score-inp" type="number" min="0" max="999" value="${otb}" placeholder="–" data-mid="${id}" data-field="bk_otb" oninput="setBracketScore('${id}','bk_otb',this.value)" style="width:50px;font-size:17px;border-color:var(--accent)">
            </div>`:''}
            ${sa&&sb2&&!tied&&(totalA!==totalB)?`<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;text-align:center">${totalA>totalB?aName+' wins '+totalA+'-'+totalB:bName+' wins '+totalB+'-'+totalA}</div>`:''}
            ${tied&&!otTa&&!otTb?`<div style="font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:1px;text-align:center">TIE — enter OT above</div>`:''}
          </div>`;
        } else {
          const setsToShow=p.oneSetTiebreaker?1:maxSets;
          for(let si=0;si<setsToShow;si++){
            const sv=['s1','s2','s3'][si];const sa=bs[sv+'a']||'',sb2=bs[sv+'b']||'';
            let bwa=0,bwb=0;getBracketSets(bs).forEach((r,ri2)=>{if(!r||ri2===si)return;if(r.a>r.b)bwa++;else if(r.b>r.a)bwb++;});
            const needed=p.oneSetTiebreaker?1:Math.ceil(maxSets/2);const locked=!p.oneSetTiebreaker&&si===setsToShow-1&&si>0&&(bwa>=needed||bwb>=needed);
            scoreInputs+=`<div style="display:flex;align-items:center;gap:3px;margin-right:6px"><span style="font-family:var(--mono);font-size:9px;color:var(--text3)">S${si+1}</span><input class="bm-score-inp" type="number" min="0" max="999" value="${sa}" placeholder="–" data-mid="${id}" data-field="${sv}a" oninput="setBracketScore('${id}','${sv}a',this.value)"${locked?' disabled':''}><span class="bm-sep">:</span><input class="bm-score-inp" type="number" min="0" max="999" value="${sb2}" placeholder="–" data-mid="${id}" data-field="${sv}b" oninput="setBracketScore('${id}','${sv}b',this.value)"${locked?' disabled':''}></div>`;
          }
        }
      }
      // For display: get score totals correctly
      let aT=0,bT=0;
      if(isBball(p)){aT=(parseInt(bs.bk_a)||0)+(parseInt(bs.bk_ota)||0);bT=(parseInt(bs.bk_b)||0)+(parseInt(bs.bk_otb)||0);}
      else{getBracketSets(bs).forEach(r=>{if(!r)return;if(r.a>r.b)aT++;else if(r.b>r.a)bT++;});}
      const viewScores=IS_VIEW&&a&&b&&!isBye2?(()=>{
        if(isBball(p)){const ta=(parseInt(bs.bk_a)||0)+(parseInt(bs.bk_ota)||0),tb=(parseInt(bs.bk_b)||0)+(parseInt(bs.bk_otb)||0);const ot=parseInt(bs.bk_ota)||parseInt(bs.bk_otb);return(ta||tb)?`<div style="padding:3px 8px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text2)">${ta} – ${tb}${ot?' <span style="font-size:10px;color:var(--accent)">(OT)</span>':''}</div>`:''}
        const parts=[];for(let si=0;si<(p.oneSetTiebreaker?1:maxSets);si++){const sv=['s1','s2','s3'][si];if(bs[sv+'a']!==undefined&&bs[sv+'a']!=='')parts.push(`${bs[sv+'a']}:${bs[sv+'b']}`);}
        return parts.length?`<div style="padding:3px 8px;font-family:var(--mono);font-size:11px;color:var(--text2)">${parts.join(' | ')}</div>`:''
      })():'';
      bHtml+=`<div class="bracket-slot" style="padding:${spacer*4}px 2px"><div style="display:flex;align-items:center"><div class="bm${a&&b&&!isBye2&&!bW?' bm-active':''}"><div class="bt ${aClass}">${aSeed}<span class="bt-name">${esc(aName)}</span>${bW?`<span class="bt-score">${isBball(p)?aT:aT}</span>`:''}</div><div class="bt ${bClass}">${bSeed}<span class="bt-name">${isBye2?'—':esc(bName)}</span>${bW?`<span class="bt-score">${isBball(p)?bT:bT}</span>`:''}</div>${!IS_VIEW&&scoreInputs?`<div class="bm-score-row" style="${isBball(p)?'justify-content:center;':'flex-wrap:wrap;'}gap:4px;padding:5px 7px;">${scoreInputs}</div>`:IS_VIEW&&viewScores?viewScores:''}</div>${ri<allRounds.length-1?'<div class="bracket-connector"></div>':''}</div></div>`;
    });
    bHtml+='</div></div>';
  });
  bHtml+='</div>';
  const fm=allRounds[allRounds.length-1][0];const fbs=p.bracketScores[fm.id]||{};
  const champ=fm.a&&fm.b?getBracketWinner(fbs,p):fm.a&&!fm.b?'a':null;
  let champHtml='';if(champ){const ct=champ==='a'?fm.a:fm.b;const cn=ct?(p.teams[ct.id]||'Team '+ct.id):'TBD';champHtml=`<div style="margin-top:13px;padding:13px 16px;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--r);display:flex;align-items:center;gap:11px"><span style="font-size:22px">🏆</span><div><div style="font-size:10px;font-family:var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.08em">Champion</div><div style="font-size:18px;font-weight:700">${esc(cn)}</div></div></div>`;}
  return `<div style="font-size:14px;font-weight:700;margin-bottom:10px">Playoff Bracket</div>${note}<div class="card"><div class="bracket-wrap">${bHtml}</div></div>${champHtml}`;
}
function getBracketSets(bs){return[['s1a','s1b'],['s2a','s2b'],['s3a','s3b']].map(([ak,bk])=>{const na=parseInt(bs[ak]),nb=parseInt(bs[bk]);if(isNaN(na)||isNaN(nb)||bs[ak]===''||bs[ak]===undefined)return null;return{a:na,b:nb};});}
function getBracketWinner(bs,p){
  if(isBball(p)){
    // Basketball bracket: regulation + OT
    const reg_a=parseInt(bs.bk_a)||0,reg_b=parseInt(bs.bk_b)||0;
    const ot_a=parseInt(bs.bk_ota)||0,ot_b=parseInt(bs.bk_otb)||0;
    const ta=reg_a+ot_a,tb=reg_b+ot_b;
    if(reg_a===0&&reg_b===0)return null;
    return ta>tb?'a':tb>ta?'b':null;
  }
  const maxSets=(p&&p.maxSets)||3;const oneSet=p&&p.oneSetTiebreaker;
  let wa=0,wb=0;getBracketSets(bs).forEach(r=>{if(!r)return;if(r.a>r.b)wa++;else if(r.b>r.a)wb++;});
  const needed=oneSet?1:Math.ceil(maxSets/2);if(wa>=needed)return'a';if(wb>=needed)return'b';return null;
}
function setBracketScore(mid,field,val){
  const p=pool();if(!p||IS_VIEW)return;
  if(!p.bracketScores)p.bracketScores={};
  if(!p.bracketScores[mid])p.bracketScores[mid]={};
  p.bracketScores[mid][field]=val;
  save();
  // Only re-render if a winner state changed (avoid destroying focus)
  const oldWinner=p.bracketScores[mid]._cachedWinner||null;
  const newWinner=getBracketWinner(p.bracketScores[mid],p);
  if(newWinner!==oldWinner){
    p.bracketScores[mid]._cachedWinner=newWinner;
    // Full bracket re-render needed to propagate winner — but refocus after
    const focused=document.activeElement;const focusedId=focused?focused.getAttribute('data-field'):null;const focusedMid=focused?focused.getAttribute('data-mid'):null;
    const mc=document.getElementById('main-content');
    if(mc&&activeTab==='bracket'){mc.innerHTML=pageHeader(p)+renderBracket(p);}
    // Restore focus
    if(focusedMid&&focusedId){const el=document.querySelector(`[data-mid="${focusedMid}"][data-field="${focusedId}"]`);if(el){el.focus();el.select&&el.select();}}
  }
}

// ── COURTS ──
function renderCourts(p){
  if(!p.schedule.length)return`<div style="text-align:center;padding:48px;color:var(--text3)">Generate a schedule first.</div>`;
  const courts={};p.schedule.forEach((m,i)=>{if(isBye(p,i))return;const c=m.court||'?';if(!courts[c])courts[c]=[];courts[c].push({m,i});});
  let html='<div style="margin-bottom:11px;font-size:12px;color:var(--text3)">Live view by court.</div><div class="courts-grid">';
  Object.keys(courts).sort((a,b)=>Number(a)-Number(b)).forEach(court=>{
    html+=`<div class="court-card"><div class="court-num">Court ${court}</div>`;
    courts[court].forEach(({m,i})=>{const done=isMatchDone(p,i),sc=p.scores[i]||{};const ta=p.teams[m.a]||'T'+m.a,tb2=p.teams[m.b]||'T'+m.b;const di=(m.dayIdx||0)%7;const dObj=p.days[m.dayIdx];const ss=getSetResults(sc).filter(r=>r).map(r=>`${r.a}–${r.b}`).join(', ');html+=`<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);opacity:${done?.45:1}"><div style="margin-bottom:3px"><span class="badge bc${di}" style="font-size:9px">${esc(dayName(dObj))}</span>${dayLoc(dObj)?`<span style="font-size:9px;color:var(--text3);margin-left:3px">📍${esc(dayLoc(dObj))}</span>`:''}${done?' <span class="badge badge-done" style="font-size:9px">✓</span>':''}</div><div style="font-size:12px;font-weight:600;line-height:1.4">${esc(ta)}<br><span style="font-size:10px;color:var(--text3);font-weight:400">vs</span><br>${esc(tb2)}</div>${ss?`<div style="font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:2px">${ss}</div>`:''}</div>`;});
    html+='</div>';
  });
  return html+'</div>';
}

// ── DRAG REORDER ──
let dragSrc=null;
function initDrag(){
  const tbody=document.querySelector('#match-table tbody');if(!tbody||IS_VIEW)return;
  tbody.querySelectorAll('tr[draggable]').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrc=row;e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{dragSrc=null;tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();if(dragSrc&&dragSrc!==row){tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');}});
    row.addEventListener('drop',e=>{e.preventDefault();if(!dragSrc||dragSrc===row)return;const p=pool();if(!p)return;const fi=parseInt(dragSrc.dataset.idx),ti=parseInt(row.dataset.idx);if(isNaN(fi)||isNaN(ti))return;const tmp=p.schedule[fi];p.schedule[fi]=p.schedule[ti];p.schedule[ti]=tmp;const ts=p.scores[fi];p.scores[fi]=p.scores[ti]||{};p.scores[ti]=ts||{};save();render();});
  });
}

// ── FIELD SETTERS ──
function setField(path,val){const p=pool();if(!p||IS_VIEW)return;const parts=path.split('.');let obj=p;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;save();}
function setDayField(i,field,val){const p=pool();if(!p||IS_VIEW)return;if(typeof p.days[i]==='string')p.days[i]={name:p.days[i],location:''};if(!p.days[i])p.days[i]={name:'',location:''};p.days[i][field]=val;save();}
function addDay(){const p=pool();if(p&&!IS_VIEW&&p.days.length<12){p.days.push({name:'Session '+(p.days.length+1),location:''});save();render();}}
function removeDay(i){const p=pool();if(p&&!IS_VIEW&&p.days.length>1){p.days.splice(i,1);save();render();}}
function changeTeams(d){const p=pool();if(!p||IS_VIEW)return;p.numTeams=Math.max(3,Math.min(75,p.numTeams+d));save();render();}
function setScore(idx,field,val){const p=pool();if(!p||IS_VIEW)return;if(!p.scores[idx])p.scores[idx]={};p.scores[idx][field]=val;save();const prog=matchProgress(p);const sub=document.querySelector('.page-sub');if(sub)sub.textContent=`${p.numTeams} teams · ${p.schedule.length} matches · ${prog.done}/${prog.total} complete`;const fill=document.querySelector('.progress-fill');if(fill&&prog.total){const pct=Math.round(prog.done/prog.total*100);fill.style.width=pct+'%';fill.className='progress-fill'+(pct===100?' done':'');}}
function flashSave(idx){const btn=document.getElementById('sb'+idx);if(!btn)return;btn.textContent='✓';btn.classList.add('btn-ok');setTimeout(()=>{if(btn){btn.textContent='Save';btn.classList.remove('btn-ok');}},1200);}
function setMatchDay(idx,dayIdx){const p=pool();if(!p||IS_VIEW)return;p.schedule[idx].dayIdx=parseInt(dayIdx);save();render();}
function setMatchCourt(idx,val){const p=pool();if(!p||IS_VIEW)return;p.schedule[idx].court=parseInt(val)||p.courtStart;save();}

  showModal();
  setTimeout(()=>document.getElementById('lib-new-name')?.focus(),60);

function clearTeamLibrary(){
  if(!confirm('Clear the entire team library? This cannot be undone.'))return;
  state.teamLibrary=[];save();openTeamLibraryModal();
}
function addToLib(){
  const inp=document.getElementById('lib-new-name');if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  if(!state.teamLibrary)state.teamLibrary=[];
  if(state.teamLibrary.length>=75){alert('Library is full (75 teams max).');return;}
  if(!state.teamLibrary.includes(name)){state.teamLibrary.push(name);save();}
  inp.value='';openTeamLibraryModal();
}
function removeFromLib(i){if(!state.teamLibrary)return;state.teamLibrary.splice(i,1);save();openTeamLibraryModal();}
function assignTeamFromLib(idx){
  const p=pool();if(!p){alert('Open a pool first.');return;}
  const lib=state.teamLibrary||[];const name=lib[idx];if(!name)return;
  // Find next empty or default-named slot
  for(let i=1;i<=p.numTeams;i++){
    if(!p.teams[i]||p.teams[i]==='Team '+i){p.teams[i]=name;save();openTeamLibraryModal();return;}

function openBulkAddLib(){

function doBulkAddLib(){

// ── LIVE SYNC VIA JSONBIN ──
// Viewers scan QR → page loads → auto-fetches latest data from JSONBin
// Editor saves → auto-pushes to JsonBin if key is set
let syncBinId=null;
function loadSyncConfig(){syncBinId=localStorage.getItem('tt_binid')||null;}
loadSyncConfig();

async function pushToCloud(){
  const key=localStorage.getItem('tt_apikey');if(!key||!syncBinId)return;
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${syncBinId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Versioning':'false'},body:JSON.stringify(state)});
  }catch(e){console.log('Sync push failed',e);}
}
async function pullFromCloud(){
  const key=localStorage.getItem('tt_apikey');const binId=syncBinId||new URLSearchParams(location.search).get('bin');
  if(!key||!binId)return false;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers:{'X-Master-Key':key}});
    if(!r.ok)return false;
    const d=await r.json();
    if(d&&d.record&&d.record.tournaments){state=d.record;save();return true;}
  }catch(e){}
  return false;
}

function openSyncSetupModal(){
  const key=localStorage.getItem('tt_apikey')||'';
  const binId=syncBinId||'';
  document.getElementById('modal-inner').innerHTML=`<div class="modal-title">☁️ Live sync setup</div>
    <div class="modal-sub">Connect a free <b>JSONBin.io</b> account for live QR sharing — no resending needed. Viewers always see the latest scores.<br><br>
    <b>Steps:</b><br>1. Go to <a href="https://jsonbin.io" target="_blank" style="color:var(--accent)">jsonbin.io</a> and create a free account<br>2. Copy your Master Key from Dashboard → API Keys<br>3. Paste it here and click Save — we'll create a bin for you automatically</div>
    <div class="modal-row"><label>JSONBin Master Key</label><input type="password" id="sync-key" style="width:100%" value="${esc(key)}" placeholder="$2a$10..."></div>
    ${binId?`<div style="font-size:11px;color:var(--text3);margin-bottom:8px">Bin ID: <span style="font-family:var(--mono)">${binId}</span></div>`:''}
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>${binId?`<button class="btn btn-danger btn-sm" onclick="disconnectSync()">Disconnect</button>`:''}
    <button class="btn btn-primary" onclick="setupSync()">Save &amp; Connect</button></div>`;
  showModal();
}
async function setupSync(){
  const key=(document.getElementById('sync-key').value||'').trim();if(!key){alert('Enter your JSONBin Master Key.');return;}
  const btn=document.querySelector('#modal-inner .btn-primary');if(btn)btn.textContent='Connecting...';
  try{
    // Create a new bin with current state
    const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Name':'TourneyTrack'},body:JSON.stringify(state)});
    if(!r.ok){const e=await r.json();alert('Error: '+(e.message||r.status));return;}
    const d=await r.json();
    syncBinId=d.metadata.id;
    localStorage.setItem('tt_apikey',key);
    localStorage.setItem('tt_binid',syncBinId);
    closeModal();
    showShareModal();
  }catch(e){alert('Connection failed: '+e.message);}
}
function disconnectSync(){localStorage.removeItem('tt_apikey');localStorage.removeItem('tt_binid');syncBinId=null;closeModal();}

// Override save to also push to cloud
const _origSave=save;
window.save=function(){_origSave();if(syncBinId)pushToCloud();}

// If viewer arrives via ?bin=XXX, auto-pull
async function initViewerSync(){
  if(!IS_VIEW)return;
  const params=new URLSearchParams(location.search);
  const binId=params.get('bin');const key=params.get('k');
  if(!binId||!key)return;
  // Store temporarily for pull
  localStorage.setItem('tt_apikey',key);
  syncBinId=binId;
  const pulled=await pullFromCloud();
  if(pulled){render();startLivePolling();}
}
function startLivePolling(){
  // Poll every 15 seconds for view mode
  if(!IS_VIEW)return;
  setInterval(async()=>{const pulled=await pullFromCloud();if(pulled)render();},15000);
}

// ── UPDATE showShareModal to use live sync if available ──
function showShareModal(){
  const hasBin=!!syncBinId;
  const key=localStorage.getItem('tt_apikey')||'';
  if(hasBin&&key){
    // Live QR — encode bin+key into URL, no data needed
    const viewUrl=`${location.href.split('?')[0]}?bin=${syncBinId}&k=${encodeURIComponent(key)}&view=1`;
    const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(viewUrl)}`;
    document.getElementById('modal-inner').innerHTML=`<div class="modal-title">🔗 Live share — always up to date</div>
      <div class="modal-sub">This QR always shows the latest scores. <b>No need to resend it.</b> Viewers refresh every 15 seconds automatically.</div>
      <div style="display:flex;justify-content:center;margin:12px 0"><img src="${qrUrl}" style="width:200px;height:200px;border-radius:8px;border:1px solid var(--border)" alt="QR"></div>
      <div style="background:var(--green-bg);border:1px solid var(--green-border);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--green);margin-bottom:10px">☁️ Live sync active — scores push to cloud automatically when saved.</div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button><button class="btn" onclick="openSyncSetupModal()">⚙️ Sync settings</button><button class="btn btn-primary" id="copy-share-btn" onclick="doShareCopy('${viewUrl.replace(/'/g,'\\\'').replace(/"/g,'&quot;')}')">Copy link</button></div>`;
    window._shareUrl=viewUrl;showModal();
  }else{
    // Fallback: data-in-URL
    try{
      const b64=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
      const url=location.href.split('#')[0]+'#data='+encodeURIComponent(b64)+'&view=1';
      const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url.slice(0,2000))}`;
      document.getElementById('modal-inner').innerHTML=`<div class="modal-title">🔗 Share results</div>
        <div class="modal-sub">Scan to view results now. <b>⚠ Snapshot only</b> — you need to reshare after scores change.<br><br><button class="btn btn-primary btn-sm" onclick="closeModal();openSyncSetupModal()">☁️ Set up live sync (no resending)</button></div>
        <div style="display:flex;justify-content:center;margin:12px 0"><img src="${qrUrl}" style="width:200px;height:200px;border-radius:8px;border:1px solid var(--border)" alt="QR" onerror="this.style.display='none'"></div>
        <div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" id="copy-share-btn" onclick="doShareCopy()">Copy link</button></div>`;
      window._shareUrl=url;showModal();
    }catch(e){alert('Could not generate share link.');}
  }
}

function printStandings(){const p=pool();if(!p){alert('Select a pool first.');return;}const ranked=rankTeams(p);let rows=ranked.map((t,i)=>{const pm=t.pm;const name=p.teams[t.id]||'Team '+t.id;const seed=p.seeds&&p.seeds[t.id]?` (#${p.seeds[t.id]})`:'';return`<tr><td>${i+1}</td><td>${name}${seed}</td><td>${t.mw}</td><td>${t.ml}</td><td>${t.sw}</td><td>${t.sl}</td><td>${t.pf}</td><td>${t.pa}</td><td>${pm>=0?'+':''}${pm}</td></tr>`;}).join('');const win=window.open('','_blank');win.document.write(`<!DOCTYPE html><html><head><title>${p.name}</title><style>body{font-family:sans-serif;padding:20px;font-size:12px}table{width:100%;border-collapse:collapse}th{text-align:left;padding:6px;border-bottom:2px solid #ccc;font-size:9px;text-transform:uppercase}td{padding:6px;border-bottom:1px solid #eee}</style></head><body><h2>${p.name} — Standings</h2><p style="color:#888;font-size:10px">TB: ${(p.tiebreakers||[]).join(' → ')}</p><table><thead><tr><th>#</th><th>Team</th><th>Match W</th><th>Match L</th><th>Sets W</th><th>Sets L</th><th>Pts For</th><th>Pts Against</th><th>+/−</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);win.document.close();win.print();}
function exportCSV(){const p=pool();if(!p){alert('Select a pool first.');return;}let csv='Match,Team A,Team B,S1A,S1B,S2A,S2B,S3A,S3B,Winner\n';p.schedule.forEach((m,i)=>{if(isBye(p,i))return;const sc=p.scores[i]||{};const w=getMatchWinner(sc,p);const wn=w==='a'?(p.teams[m.a]||'T'+m.a):w==='b'?(p.teams[m.b]||'T'+m.b):'';csv+=`${i+1},"${p.teams[m.a]||'T'+m.a}","${p.teams[m.b]||'T'+m.b}",${sc.s1a||''},${sc.s1b||''},${sc.s2a||''},${sc.s2b||''},${sc.s3a||''},${sc.s3b||''},"${wn}"\n`;});const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=p.name.replace(/\s+/g,'_')+'.csv';a.click();}

function shouldShowWizard(){return!localStorage.getItem('tt_wizard_done');}
function startWizard(){if(!shouldShowWizard()||IS_VIEW)return;wizardStep=0;document.getElementById('wizard-overlay').style.display='block';showWizardStep();}
function showWizardStep(){
  const step=WIZARD_STEPS[wizardStep];if(!step){finishWizard();return;}
  const hl=document.getElementById('wz-highlight'),tt=document.getElementById('wz-tooltip');
  const target=step.target?step.target():null;
  if(target){const rect=target.getBoundingClientRect();hl.style.cssText=`left:${rect.left-5}px;top:${rect.top-5}px;width:${rect.width+10}px;height:${rect.height+10}px;display:block;`;const ttW=280,ttH=210;let left,top;if(step.placement==='right'){left=rect.right+12;top=Math.max(10,rect.top-30);}else if(step.placement==='bottom'){left=Math.max(10,rect.left);top=rect.bottom+10;}else{left=Math.max(10,rect.left);top=rect.top-ttH-10;}left=Math.min(left,window.innerWidth-ttW-10);top=Math.min(top,window.innerHeight-ttH-10);tt.style.cssText=`left:${left}px;top:${top}px;`;}
  else{hl.style.display='none';tt.style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';}
  const dots=WIZARD_STEPS.map((_,i)=>`<div class="wz-dot${i<=wizardStep?' done':''}"></div>`).join('');
  tt.innerHTML=`<div class="wz-step-pill">Step ${wizardStep+1} of ${WIZARD_STEPS.length}</div><div class="wz-progress">${dots}</div><div class="wz-title">${step.title}</div><div class="wz-body">${step.body}</div><div class="wz-actions"><button class="wz-skip" onclick="finishWizard()">Skip</button>${!step.waitFor?`<button class="btn btn-primary btn-sm" onclick="advanceWizard()">Next →</button>`:`<button class="btn btn-sm" style="opacity:.5;cursor:default">Do the action above</button>`}</div>`;
}
function advanceWizard(){wizardStep++;setTimeout(showWizardStep,300);}
function finishWizard(){document.getElementById('wizard-overlay').style.display='none';localStorage.setItem('tt_wizard_done','1');}
function wizardNotify(event){if(!shouldShowWizard())return;const step=WIZARD_STEPS[wizardStep];if(step&&step.waitFor===event)advanceWizard();}

function addToLibrary(name){if(!name||name.startsWith('Team '))return;if(!state.teamLibrary)state.teamLibrary=[];if(state.teamLibrary.length<75&&!state.teamLibrary.includes(name)){state.teamLibrary.push(name);save();}}
function importFromLibrary(){
  const p=pool();if(!p||IS_VIEW)return;
  const lib=state.teamLibrary||[];if(!lib.length){alert('No teams in library yet. Use 📚 Manage team library to add teams.');return;}
  document.getElementById('modal-inner').innerHTML=`<div class="modal-title">⚡ Fill from library</div>
    <div class="modal-sub">Select teams to assign to this pool's ${p.numTeams} slots (in order).</div>

function doImportFromLib(){
  const p=pool();if(!p)return;
  const checked=[...document.querySelectorAll('[id^="lib-chk-"]:checked')].map(el=>el.value);

  checked.slice(0,p.numTeams).forEach((name,i)=>{p.teams[i+1]=name;});

}
